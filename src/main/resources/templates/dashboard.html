<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SpringPilot</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <nav class="navbar">
                <div class="logo">
                    <h1>SpringPilot</h1>
                </div>
                <div class="nav-items">
                    <span class="user-greeting" id="user-greeting">Welcome!</span>
                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <button class="btn btn-secondary" id="logout-btn">Logout</button>
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="dashboard-content">
            <div class="content-wrapper">
                <!-- Actions Bar -->
                <div class="actions-bar">
                    <h2>My Journal Entries</h2>
                    <button class="btn btn-primary" id="new-entry-btn">
                        <span>+ New Entry</span>
                    </button>
                </div>

                <!-- Loading State -->
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading your entries...</p>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="empty-state" style="display: none;">
                    <div class="empty-icon">📝</div>
                    <h3>No journal entries yet</h3>
                    <p>Start documenting your thoughts and experiences</p>
                    <button class="btn btn-primary" onclick="document.getElementById('new-entry-btn').click()">Create Your First Entry</button>
                </div>

                <!-- Entries Grid -->
                <div id="entries-grid" class="entries-grid"></div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit Entry -->
    <div id="entry-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">New Journal Entry</h3>
                <button class="modal-close" id="close-modal">&times;</button>
            </div>
            <form id="entry-form">
                <input type="hidden" id="entry-id">
                <div class="form-group">
                    <label for="entry-title">Title</label>
                    <input type="text" id="entry-title" name="title" required placeholder="Enter a title for your entry">
                </div>
                <div class="form-group">
                    <label for="entry-content">Content</label>
                    <textarea id="entry-content" name="content" rows="10" placeholder="Write your thoughts..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">
                        <span class="btn-text">Save Entry</span>
                        <span class="btn-loader" style="display: none;"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal" style="display: none;">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Delete Entry</h3>
                <button class="modal-close" id="close-delete-modal">&times;</button>
            </div>
            <p>Are you sure you want to delete this journal entry? This action cannot be undone.</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancel-delete-btn">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
