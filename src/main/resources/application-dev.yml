spring:
  application:
    name: SpringPilot
  mongodb:
    uri: ${MONGO_URI}
    database: ${MONGO_DB}
  data:
    mongodb:
      auto-index-creation: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080